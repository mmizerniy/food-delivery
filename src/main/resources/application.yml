spring:
  application:
    name: food-delivery-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/food_delivery?options=-c%20TimeZone=Europe/Kyiv
    username: postgres
    password: lilbrodyaga2005

  jpa:
    hibernate:
      ddl-auto: validate

    properties:
      hibernate:
        format_sql: true

    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379

  kafka:
    bootstrap-servers: localhost:9092

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

springdoc:
  swagger-ui:
    path: /swagger-ui.html